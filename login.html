<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enes Güler - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Enes Güler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş (CV)</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link active text-warning fw-bold" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 mt-5">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4">Sisteme Giriş</h3>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label fw-semibold">E-posta Adresi</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="ornek@sakarya.edu.tr">
                                <div id="loginEmailError" class="text-danger small mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <label for="loginPassword" class="form-label fw-semibold">Şifre</label>
                                <input type="password" class="form-control" id="loginPassword" placeholder="Şifrenizi giriniz">
                                <div id="loginPasswordError" class="text-danger small mt-1"></div>
                            </div>

                            <div class="d-grid">
                                <button type="button" class="btn btn-warning py-2 fw-bold text-dark" onclick="validateLogin()">Giriş Yap</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validateLogin() {
            // Hata mesajlarını sıfırla
            document.getElementById('loginEmailError').innerText = "";
            document.getElementById('loginPasswordError').innerText = "";

            // Verileri al
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            let isValid = true;

            // E-posta format kontrolü (Regex)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email === "") {
                document.getElementById('loginEmailError').innerText = "E-posta adresi boş bırakılamaz.";
                isValid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('loginEmailError').innerText = "Lütfen geçerli bir e-posta adresi formatı kullanın.";
                isValid = false;
            }

            // Şifre boşluk kontrolü
            if (password === "") {
                document.getElementById('loginPasswordError').innerText = "Şifre alanı boş bırakılamaz.";
                isValid = false;
            }

            // Doğrulama başarılıysa
            if (isValid) {
                // Sınav/Proje senaryosu için hardcoded kimlik doğrulaması eklenebilir. 
                // Şu an sadece boşluk ve format kontrolü yapıp içeri alıyor.
                alert("Hoş geldiniz, " + email + "\n\nKimlik doğrulaması başarılı.");
                
                // Başarılı giriş sonrası ana sayfaya yönlendir
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
