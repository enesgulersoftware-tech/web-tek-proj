<html lang="tr">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Enes Güler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş (CV)</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link active text-warning fw-bold" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 mt-5">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4">Sisteme Giriş</h3>
                        
                        <div id="serverError" class="alert alert-danger d-none text-center small"></div>

                        <form action="login.php" method="POST" id="loginForm" onsubmit="return validateLogin()">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label fw-semibold">E-posta Adresi</label>
                                <input type="email" class="form-control" id="loginEmail" name="email" placeholder="ogrno@sakarya.edu.tr">
                                <div id="loginEmailError" class="text-danger small mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <label for="loginPassword" class="form-label fw-semibold">Şifre</label>
                                <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Öğrenci Numaranız">
                                <div id="loginPasswordError" class="text-danger small mt-1"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning py-2 fw-bold text-dark">Giriş Yap</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // URL'de hata parametresi varsa yakala ve ekrana yazdır (PHP'den gelen yönlendirme için)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('status') === 'error') {
                const errorBox = document.getElementById('serverError');
                errorBox.innerText = "Kullanıcı adı veya şifre hatalı!";
                errorBox.classList.remove('d-none');
            }
        };

        function validateLogin() {
            document.getElementById('loginEmailError').innerText = "";
            document.getElementById('loginPasswordError').innerText = "";
            document.getElementById('serverError').classList.add('d-none');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            let isValid = true;

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email === "") {
                document.getElementById('loginEmailError').innerText = "E-posta adresi boş bırakılamaz.";
                isValid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('loginEmailError').innerText = "Lütfen geçerli bir e-posta adresi formatı kullanın.";
                isValid = false;
            }

            if (password === "") {
                document.getElementById('loginPasswordError').innerText = "Şifre alanı boş bırakılamaz.";
                isValid = false;
            }

            // isValid false ise form PHP'ye GİTMEZ. True ise POST işlemi başlar.
            return isValid;
        }
    </script>
</body>
</html>
